name: Deploy Dashboard → GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "main_dashboard/**"
      - "scripts/update_data.py"
      - ".github/workflows/deploy-pages.yml"
  schedule:
    # Обновлять данные каждые 6 часов (в 0:00, 6:00, 12:00, 18:00 UTC)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      refresh_data:
        description: "Обновить данные из Google Sheets перед деплоем?"
        type: boolean
        default: true

# Права для деплоя на GitHub Pages
permissions:
  contents: write   # нужен для коммита data.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: обновляем data.json из Google Sheets ────────────────
  refresh-data:
    name: Refresh data.json
    runs-on: ubuntu-latest
    # Запускать только по расписанию или при ручном запуске с refresh=true
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_data == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Update data.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/update_data.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh dashboard data [skip ci]"
          file_pattern: "main_dashboard/data.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ── Job 2: деплоим main_dashboard/ на GitHub Pages ────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [refresh-data]
    # Деплоить всегда: и при push, и после обновления данных
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Забрать последнюю версию (включая возможный коммит data.json)
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (main_dashboard/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./main_dashboard"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
