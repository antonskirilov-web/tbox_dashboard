name: Deploy Dashboard → GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "main_dashboard/**"
      - "scripts/update_data.py"
      - ".github/workflows/deploy-pages.yml"
  schedule:
    # Обновлять данные каждые 6 часов
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Обновляем data.json только по расписанию / вручную ──
      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pip install gspread google-auth

      - name: Refresh data.json
        if: |
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          secrets.GOOGLE_CREDENTIALS != ''
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/update_data.py

      - name: Commit updated data.json (if changed)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh dashboard data [skip ci]"
          file_pattern: "main_dashboard/data.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # ── Деплой (всегда) ──────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (main_dashboard/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./main_dashboard"

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
