<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-BOX Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f2f2f7;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,.07);
      --t1:       #1c1c1e;
      --t2:       #3a3a3c;
      --t3:       #8e8e93;
      --t4:       #aeaeb2;
      --green:    #30d158;
      --red:      #ff453a;
      --blue:     #007aff;
      --orange:   #ff9f0a;
      --sh-sm:    0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.05);
      --sh-md:    0 4px 20px rgba(0,0,0,.10), 0 0 0 1px rgba(0,0,0,.05);
      --r: 18px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      padding: 32px 24px 56px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px; flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-box {
      width: 40px; height: 40px; background: var(--t1); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-box span { color: #fff; font-size: 13px; font-weight: 800; letter-spacing: -.5px; }
    .logo-name { font-size: 20px; font-weight: 700; letter-spacing: -.4px; }

    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--t3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px; white-space: nowrap;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse-dot 2s infinite;
    }
    .live-dot.loading { background: var(--orange); animation: pulse-dot 1s infinite; }
    .live-dot.error   { background: var(--red);    animation: none; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.85); }
    }
    .refresh-btn {
      font-size: 13px; font-family: var(--font); color: var(--blue);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px; cursor: pointer;
      transition: background .15s;
    }
    .refresh-btn:hover:not(:disabled) { background: #f0f6ff; }
    .refresh-btn:disabled { opacity: .45; cursor: default; }

    /* ── Section ── */
    .section { margin-bottom: 32px; }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--t3);
      margin-bottom: 14px; padding-left: 2px;
    }

    /* ── Cards ── */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface); border-radius: var(--r);
      padding: 22px 22px 20px; box-shadow: var(--sh-sm);
      transition: box-shadow .2s, transform .15s;
    }
    .card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--t2); }
    .card-link {
      font-size: 16px; color: var(--blue); text-decoration: none;
      opacity: .7; transition: opacity .15s; line-height: 1;
    }
    .card-link:hover { opacity: 1; }

    .balance-block { margin-bottom: 20px; }
    .balance-amount {
      font-size: 36px; font-weight: 700; letter-spacing: -1.5px;
      line-height: 1; margin-bottom: 6px;
    }
    .c-pos { color: var(--green); }
    .c-neg { color: var(--red);   }
    .c-neu { color: var(--t3);    }
    .balance-sub { font-size: 11px; color: var(--t4); letter-spacing: .3px; text-transform: uppercase; }

    .divider { height: 1px; background: var(--bg); margin: 0 -22px 16px; }

    .meta-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .meta-row:last-child { margin-bottom: 0; }
    .meta-key { font-size: 14px; color: var(--t3); }
    .meta-val { font-size: 14px; font-weight: 500; color: var(--t2); }

    /* Skeleton */
    .sk {
      background: linear-gradient(90deg,#ececec 25%,#f5f5f5 50%,#ececec 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; display: inline-block;
    }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    .err-inline { font-size: 12px; color: var(--red); }

    /* countdown */
    #countdown { font-variant-numeric: tabular-nums; }

    @media(max-width:480px){
      body{padding:20px 16px 40px;}
      .balance-amount{font-size:30px;}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-box"><span>TB</span></div>
    <div class="logo-name">T-BOX Dashboard</div>
  </div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="live-dot loading" id="live-dot"></div>
      <span id="status-text">Загрузка…</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="load(true)">↻</button>
  </div>
</div>

<div class="section">
  <div class="section-label">ДДСки</div>
  <div class="cards-row">

    <div class="card">
      <div class="card-head">
        <span class="card-title">ДДС Илья</span>
        <a class="card-link" href="https://docs.google.com/spreadsheets/d/1x-q_WK0fLkr1lwFMQE3bqViCfkQRb5vU8QCwkp4OjpU" target="_blank">↗</a>
      </div>
      <div class="balance-block">
        <div class="balance-amount c-neu" id="ilya-balance"><span class="sk" style="width:150px;height:36px"></span></div>
      </div>
      <div class="divider"></div>
      <div class="meta-row">
        <span class="meta-key">Последняя дата обновления ДДС</span>
        <span class="meta-val" id="ilya-date"><span class="sk" style="width:70px;height:12px"></span></span>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">ДДС Кристина</span>
        <a class="card-link" href="https://docs.google.com/spreadsheets/d/1uhh60Ab5WrXOEizKUXhCK41XWSG6KLbOuuPgvw3XvoI" target="_blank">↗</a>
      </div>
      <div class="balance-block">
        <div class="balance-amount c-neu" id="kristina-balance"><span class="sk" style="width:130px;height:36px"></span></div>
      </div>
      <div class="divider"></div>
      <div class="meta-row">
        <span class="meta-key">Последняя дата обновления ДДС</span>
        <span class="meta-val" id="kristina-date"><span class="sk" style="width:70px;height:12px"></span></span>
      </div>
    </div>

  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const REFRESH_INTERVAL_MS = 5 * 60 * 1000; // 5 минут
const SHEET_NAME = 'Все деньги';

const SHEETS = {
  ilya: {
    id:       '1x-q_WK0fLkr1lwFMQE3bqViCfkQRb5vU8QCwkp4OjpU',
    balElId:  'ilya-balance',
    dateElId: 'ilya-date',
  },
  kristina: {
    id:       '1uhh60Ab5WrXOEizKUXhCK41XWSG6KLbOuuPgvw3XvoI',
    balElId:  'kristina-balance',
    dateElId: 'kristina-date',
  },
};

// ── Fallback (кеш последних известных данных) ─────────────────────────────
const FALLBACK = {
  ilya:     { balance: '−р.70 865', lastDate: '26.04.2026' },
  kristina: { balance: '−р.4 741',  lastDate: '29.04.2026' },
};

// ── Google Sheets gviz/tq API ─────────────────────────────────────────────
function gvizUrl(spreadsheetId, sheetName, range) {
  return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq`
    + `?tqx=out:json`
    + `&sheet=${encodeURIComponent(sheetName)}`
    + `&range=${encodeURIComponent(range)}`
    + `&headers=0`
    + `&_=${Date.now()}`;   // cache bust
}

function parseGviz(text) {
  // Ответ обёрнут: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const m = text.match(/setResponse\(([\s\S]*?)\);\s*$/);
  if (!m) throw new Error('Unexpected gviz format');
  return JSON.parse(m[1]);
}

async function fetchRange(sheetId, range) {
  const res = await fetch(gvizUrl(sheetId, SHEET_NAME, range));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseGviz(await res.text());
}

// ── Парсинг ─────────────────────────────────────────────────────────────────
function extractH1(gvizData) {
  // H1 → gviz возвращает либо число, либо строку (зависит от типа ячейки)
  const cell = gvizData?.table?.rows?.[0]?.c?.[0];
  if (!cell) return null;
  // v = значение, f = отформатированная строка (приоритет)
  return cell.f ?? String(cell.v ?? '');
}

function formatDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  const gviz = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
  if (gviz) {
    const d = String(gviz[3]).padStart(2, '0');
    const m = String(Number(gviz[2]) + 1).padStart(2, '0');
    return `${d}.${m}.${gviz[1]}`;
  }
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  if (/^\d{2}\.\d{2}$/.test(s)) return `${s}.${new Date().getFullYear()}`;
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) return `${String(slash[2]).padStart(2,'0')}.${String(slash[1]).padStart(2,'0')}.${slash[3]}`;
  return s;
}

function extractLastDate(gvizData) {
  const rows = gvizData?.table?.rows ?? [];
  let last = null;
  for (const row of rows) {
    const v = row?.c?.[0];
    if (!v) continue;
    const raw = String(v.v ?? v.f ?? '').trim();
    if (raw && raw !== 'дата' && raw !== '???' && raw !== '##') {
      last = formatDate(raw);
    }
  }
  return last;
}

// ── Форматирование баланса ────────────────────────────────────────────────
function balanceClass(raw) {
  if (!raw) return 'c-neu';
  const s = raw.replace(/[\s ]/g, '').replace(/[−-]/, '-');
  if (s.startsWith('-')) return 'c-neg';
  if (s === '0' || s === 'р.0') return 'c-neu';
  return 'c-pos';
}

function renderCard(cfg, balance, lastDate) {
  const balEl  = document.getElementById(cfg.balElId);
  const dateEl = document.getElementById(cfg.dateElId);
  const cls    = balanceClass(balance);
  balEl.className  = `balance-amount ${cls}`;
  balEl.textContent = balance ?? '—';
  dateEl.textContent = lastDate ?? '—';
}

function renderError(cfg, fallback) {
  const balEl  = document.getElementById(cfg.balElId);
  const dateEl = document.getElementById(cfg.dateElId);
  balEl.className  = 'balance-amount c-neg';
  balEl.textContent = fallback.balance + ' *';
  dateEl.textContent = fallback.lastDate + ' *';
}

// ── Статус-пилюля ────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('live-dot');
  const lbl = document.getElementById('status-text');
  dot.className = 'live-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
  lbl.textContent = text;
}

// ── Обратный отсчёт ──────────────────────────────────────────────────────
let countdownInterval = null;
function startCountdown(ms) {
  if (countdownInterval) clearInterval(countdownInterval);
  let remaining = Math.round(ms / 1000);
  const update = () => {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    setStatus('ok', `Обновлено · след. через ${m}:${String(s).padStart(2, '0')}`);
    if (remaining <= 0) { clearInterval(countdownInterval); load(true); }
    remaining--;
  };
  update();
  countdownInterval = setInterval(update, 1000);
}

// ── Основная загрузка ────────────────────────────────────────────────────
let busy = false;

async function load(manual = false) {
  if (busy) return;
  busy = true;
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  setStatus('loading', 'Загружаю…');

  let anyError = false;

  await Promise.all(Object.entries(SHEETS).map(async ([key, cfg]) => {
    try {
      const [h1Data, dateData] = await Promise.all([
        fetchRange(cfg.id, 'H1'),
        fetchRange(cfg.id, 'C:C'),
      ]);
      const balance  = extractH1(h1Data);
      const lastDate = extractLastDate(dateData);
      renderCard(cfg, balance, lastDate);
    } catch (err) {
      console.warn(`[T-BOX] ${key}:`, err.message);
      renderError(cfg, FALLBACK[key]);
      anyError = true;
    }
  }));

  btn.disabled = false;
  busy = false;

  if (anyError) {
    setStatus('error', 'Ошибка — проверь доступ к таблицам (нужно «Доступ по ссылке»)');
  } else {
    startCountdown(REFRESH_INTERVAL_MS);
  }
}

// Первый запуск
load();
</script>
</body>
</html>
