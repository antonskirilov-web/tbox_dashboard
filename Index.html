<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Все деньги</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --accent: #52c30b;
        --accent-deep: #399500;
        --accent-soft: rgba(82, 195, 11, 0.12);
        --text: #14210d;
        --muted: #65805d;
        --line: rgba(20, 33, 13, 0.08);
        --surface: rgba(255, 255, 255, 0.92);
        --surface-strong: #ffffff;
        --danger: #cf2d2d;
        --shadow: 0 18px 42px rgba(32, 65, 15, 0.14);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: 'Manrope', sans-serif;
        background:
          radial-gradient(circle at top left, rgba(82, 195, 11, 0.18), transparent 34%),
          linear-gradient(180deg, #f7ffef 0%, #eff8e9 50%, #f9fbf7 100%);
        color: var(--text);
      }

      body {
        padding: 18px 14px 28px;
      }

      .app-shell {
        width: min(100%, 480px);
        margin: 0 auto;
      }

      .hero {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(82, 195, 11, 0.18), rgba(82, 195, 11, 0.05)),
          rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(82, 195, 11, 0.14);
        border-radius: var(--radius-xl);
        padding: 22px 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero::after {
        content: '';
        position: absolute;
        right: -28px;
        top: -28px;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(82, 195, 11, 0.25), transparent 70%);
      }

      .hero__eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--accent-deep);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .hero__title {
        margin: 14px 0 8px;
        font-size: 28px;
        line-height: 1.05;
        font-weight: 800;
      }

      .hero__text {
        margin: 0;
        max-width: 30ch;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }

      .form {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 16px;
        box-shadow: 0 12px 28px rgba(45, 79, 23, 0.08);
      }

      .panel__title {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 800;
      }

      .field-grid {
        display: grid;
        gap: 12px;
      }

      .two-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 13px;
        font-weight: 700;
        color: #28411a;
      }

      .input {
        width: 100%;
        border: 1px solid rgba(20, 33, 13, 0.12);
        border-radius: var(--radius-md);
        background: var(--surface-strong);
        padding: 15px 14px;
        font: inherit;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      .input::placeholder {
        color: #98aa92;
      }

      .input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
        transform: translateY(-1px);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .section-head__badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 76px;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .section-head__badge--income {
        background: rgba(82, 195, 11, 0.14);
        color: var(--accent-deep);
      }

      .section-head__badge--expense {
        background: rgba(20, 33, 13, 0.06);
        color: #27411a;
      }

      .hint {
        margin: 10px 0 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      .status {
        display: none;
        padding: 14px 15px;
        border-radius: var(--radius-md);
        font-size: 14px;
        line-height: 1.45;
      }

      .status.is-visible {
        display: block;
      }

      .status--success {
        background: rgba(82, 195, 11, 0.12);
        color: #26520a;
        border: 1px solid rgba(82, 195, 11, 0.24);
      }

      .status--error {
        background: rgba(207, 45, 45, 0.08);
        color: var(--danger);
        border: 1px solid rgba(207, 45, 45, 0.16);
      }

      .submit-wrap {
        position: sticky;
        bottom: 12px;
        padding-top: 4px;
      }

      .submit-btn {
        width: 100%;
        border: 0;
        border-radius: 20px;
        padding: 16px 18px;
        background: linear-gradient(135deg, var(--accent), #69d616);
        color: #fff;
        font: inherit;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.01em;
        box-shadow: 0 18px 36px rgba(82, 195, 11, 0.28);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }

      .submit-btn:active {
        transform: translateY(1px) scale(0.995);
      }

      .submit-btn[disabled] {
        opacity: 0.7;
        cursor: wait;
      }

      @media (min-width: 720px) {
        body {
          padding: 28px 18px 36px;
        }

        .hero__title {
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero__eyebrow">Все деньги · мобильная форма</div>
        <h1 class="hero__title">Новая запись в таблицу</h1>
        <p class="hero__text">
          Введите операцию, дату, суммы, контрагента и платёжку. Запись уйдёт
          в первую свободную строку листа.
        </p>
      </section>

      <form id="money-form" class="form">
        <section class="panel">
          <h2 class="panel__title">Основные данные</h2>
          <div class="field-grid">
            <div class="field">
              <label for="operation">Операция</label>
              <input
                id="operation"
                name="operation"
                class="input"
                type="text"
                placeholder="Например: аренда, логистика, закупка"
                required
              />
            </div>

            <div class="field">
              <label for="date">Дата</label>
              <input id="date" name="date" class="input" type="date" required />
            </div>

            <div class="field">
              <label for="contractor">Контрагент</label>
              <input
                id="contractor"
                name="contractor"
                class="input"
                type="text"
                placeholder="Название компании или ФИО"
                required
              />
            </div>

            <div class="field">
              <label for="paymentMethod">Платёжка</label>
              <input
                id="paymentMethod"
                name="paymentMethod"
                class="input"
                type="text"
                placeholder="Например: Точка, Тинькофф, Нал"
                required
              />
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2 class="panel__title">Доход</h2>
            <span class="section-head__badge section-head__badge--income">со знаком “−”</span>
          </div>
          <div class="field-grid two-col">
            <div class="field">
              <label for="incomeAnton">Антон</label>
              <input
                id="incomeAnton"
                name="incomeAnton"
                class="input"
                type="text"
                inputmode="decimal"
                placeholder="0"
              />
            </div>
            <div class="field">
              <label for="incomeLenya">Лёня</label>
              <input
                id="incomeLenya"
                name="incomeLenya"
                class="input"
                type="text"
                inputmode="decimal"
                placeholder="0"
              />
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2 class="panel__title">Расход</h2>
            <span class="section-head__badge section-head__badge--expense">обычная сумма</span>
          </div>
          <div class="field-grid two-col">
            <div class="field">
              <label for="expenseAnton">Антон</label>
              <input
                id="expenseAnton"
                name="expenseAnton"
                class="input"
                type="text"
                inputmode="decimal"
                placeholder="0"
              />
            </div>
            <div class="field">
              <label for="expenseLenya">Лёня</label>
              <input
                id="expenseLenya"
                name="expenseLenya"
                class="input"
                type="text"
                inputmode="decimal"
                placeholder="0"
              />
            </div>
          </div>
          <p class="hint">
            Для одного человека можно заполнить только одно поле: либо доход,
            либо расход.
          </p>
        </section>

        <div id="status" class="status" aria-live="polite"></div>

        <div class="submit-wrap">
          <button id="submit-btn" class="submit-btn" type="submit">
            Сохранить запись
          </button>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById('money-form');
      const submitButton = document.getElementById('submit-btn');
      const statusBox = document.getElementById('status');
      const dateInput = document.getElementById('date');

      dateInput.value = getTodayLocalISO();

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        clearStatus();

        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());

        setLoading(true);

        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            showStatus(`${result.message} Строка: ${result.row}.`, 'success');
            form.reset();
            dateInput.value = getTodayLocalISO();
          })
          .withFailureHandler((error) => {
            setLoading(false);
            showStatus(error.message || 'Не удалось сохранить запись.', 'error');
          })
          .submitMoneyEntry(payload);
      });

      function setLoading(isLoading) {
        submitButton.disabled = isLoading;
        submitButton.textContent = isLoading ? 'Сохраняем…' : 'Сохранить запись';
      }

      function showStatus(message, type) {
        statusBox.className = `status is-visible status--${type}`;
        statusBox.textContent = message;
      }

      function clearStatus() {
        statusBox.className = 'status';
        statusBox.textContent = '';
      }

      function getTodayLocalISO() {
        const now = new Date();
        const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 10);
      }
    </script>
  </body>
</html>
